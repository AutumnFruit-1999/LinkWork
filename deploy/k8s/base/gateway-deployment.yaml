apiVersion: v1
kind: Service
metadata:
  name: linkwork-mcp-gateway
  namespace: linkwork
  labels:
    app.kubernetes.io/name: linkwork-mcp-gateway
    app.kubernetes.io/part-of: linkwork
spec:
  type: ClusterIP
  ports:
    - port: 9080
      targetPort: 9080
  selector:
    app.kubernetes.io/name: linkwork-mcp-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwork-mcp-gateway
  namespace: linkwork
  labels:
    app.kubernetes.io/name: linkwork-mcp-gateway
    app.kubernetes.io/part-of: linkwork
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: linkwork-mcp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: linkwork-mcp-gateway
        app.kubernetes.io/part-of: linkwork
    spec:
      containers:
        - name: linkwork-mcp-gateway
          image: linkwork-mcp-gateway:latest
          ports:
            - containerPort: 9080
          env:
            - name: WEB_SERVICE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: linkwork-config
                  key: WEB_SERVICE_BASE_URL
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: linkwork-config
                  key: REDIS_ADDR
            - name: GATEWAY_PORT
              value: "9080"
          readinessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
