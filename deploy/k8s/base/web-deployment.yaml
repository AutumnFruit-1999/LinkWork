apiVersion: v1
kind: Service
metadata:
  name: linkwork-web
  namespace: linkwork
  labels:
    app.kubernetes.io/name: linkwork-web
    app.kubernetes.io/part-of: linkwork
spec:
  type: ClusterIP
  ports:
    - port: 3003
      targetPort: 3003
  selector:
    app.kubernetes.io/name: linkwork-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkwork-web
  namespace: linkwork
  labels:
    app.kubernetes.io/name: linkwork-web
    app.kubernetes.io/part-of: linkwork
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: linkwork-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: linkwork-web
        app.kubernetes.io/part-of: linkwork
    spec:
      containers:
        - name: linkwork-web
          image: linkwork-web:latest
          ports:
            - containerPort: 3003
          readinessProbe:
            httpGet:
              path: /
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
