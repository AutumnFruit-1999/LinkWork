apiVersion: v1
kind: Service
metadata:
  name: linkwork-backend
  namespace: linkwork
spec:
  type: NodePort
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
---
apiVersion: v1
kind: Service
metadata:
  name: linkwork-mcp-gateway
  namespace: linkwork
spec:
  type: NodePort
  ports:
    - port: 9080
      targetPort: 9080
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: linkwork-web
  namespace: linkwork
spec:
  type: NodePort
  ports:
    - port: 3003
      targetPort: 3003
      nodePort: 30003
