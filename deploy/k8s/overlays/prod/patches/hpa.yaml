apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: linkwork-backend-hpa
  namespace: linkwork
  labels:
    app.kubernetes.io/part-of: linkwork
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: linkwork-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
