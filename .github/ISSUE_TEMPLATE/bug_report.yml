name: Bug Report
description: Report a bug or unexpected behavior in LinkWork
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        **Do not report security vulnerabilities here.** Use [GitHub Private Vulnerability Reporting](https://github.com/glowdan/LinkWork/security/advisories/new) instead.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      multiple: false
      options:
        - linkwork-server
        - linkwork-executor
        - linkwork-agent-sdk
        - linkwork-mcp-gateway
        - linkwork-web
        - Docker Compose / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Start with `docker-compose up -d`
        2. Create a role via API ...
        3. Trigger a task ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, K8s version, Java/Go version, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Docker: 26.1.0
        - Java: 17.0.9
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste relevant log output here (sanitize any sensitive data).
      render: shell
    validations:
      required: false
